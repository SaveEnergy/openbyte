services:
  traefik:
    image: traefik:v3.6.8
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.localhost}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  openbyte:
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - SERVER_NAME=${SERVER_NAME:-openByte Server}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - CAPACITY_GBPS=${CAPACITY_GBPS:-25}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1000}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - MAX_STORED_RESULTS=${MAX_STORED_RESULTS:-10000}
    volumes:
      - openbyte-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openbyte.rule=${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}"
      - "traefik.http.routers.openbyte.entrypoints=web"
      - "traefik.http.services.openbyte.loadbalancer.server.port=8080"
      # Upload router with larger body limit
      - "traefik.http.routers.openbyte-upload.rule=(${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}) && PathPrefix(`/api/v1/upload`)"
      - "traefik.http.routers.openbyte-upload.entrypoints=web"
      - "traefik.http.routers.openbyte-upload.priority=100"
      - "traefik.http.routers.openbyte-upload.middlewares=openbyte-upload-body"
      - "traefik.http.routers.openbyte-secure.rule=${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}"
      - "traefik.http.routers.openbyte-secure.entrypoints=websecure"
      - "traefik.http.routers.openbyte-secure.tls=true"
      - "traefik.http.routers.openbyte-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openbyte-secure.service=openbyte"
      # HTTPS upload router with larger body limit
      - "traefik.http.routers.openbyte-upload-secure.rule=(${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}) && PathPrefix(`/api/v1/upload`)"
      - "traefik.http.routers.openbyte-upload-secure.entrypoints=websecure"
      - "traefik.http.routers.openbyte-upload-secure.tls=true"
      - "traefik.http.routers.openbyte-upload-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openbyte-upload-secure.priority=100"
      - "traefik.http.routers.openbyte-upload-secure.middlewares=openbyte-upload-body"
      # Upload body limit middleware (35MB)
      - "traefik.http.middlewares.openbyte-upload-body.buffering.maxRequestBodyBytes=36700160"
      - "traefik.http.middlewares.openbyte-upload-body.buffering.memRequestBodyBytes=1048576"
      # Optional apex redirect (e.g. sqrtops.de -> speed.sqrtops.de). Set
      # TRAEFIK_APEX_REDIRECT_RULE and TRAEFIK_CANONICAL_HOST in .env; default rule
      # matches nothing when unset.
      - "traefik.http.middlewares.openbyte-apex-redirect.redirectregex.regex=^https?://[^/]+(.*)"
      - "traefik.http.middlewares.openbyte-apex-redirect.redirectregex.replacement=https://${TRAEFIK_CANONICAL_HOST:-openbyte-apex-redirect.invalid}$${1}"
      - "traefik.http.middlewares.openbyte-apex-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.openbyte-apex.rule=${TRAEFIK_APEX_REDIRECT_RULE:-Host(`openbyte-apex-redirect.invalid`)}"
      - "traefik.http.routers.openbyte-apex.entrypoints=web,websecure"
      - "traefik.http.routers.openbyte-apex.middlewares=openbyte-apex-redirect"
      - "traefik.http.routers.openbyte-apex.priority=250"
      - "traefik.http.routers.openbyte-apex.tls=true"
      - "traefik.http.routers.openbyte-apex.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openbyte-apex.service=openbyte"
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    name: traefik
    external: true

volumes:
  traefik-certs:
  openbyte-data:
