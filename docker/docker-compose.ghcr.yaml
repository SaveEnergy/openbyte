services:
  openbyte:
    image: ghcr.io/${GHCR_OWNER:-saveenergy}/openbyte:${IMAGE_TAG:-edge}
    container_name: openbyte
    ports:
      - "8080:8080" # API + Web UI
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - SERVER_NAME=${SERVER_NAME:-openByte Server}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - CAPACITY_GBPS=${CAPACITY_GBPS:-25}
      - MAX_CONCURRENT_PER_IP=${MAX_CONCURRENT_PER_IP:-64}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1000}
      - MAX_TEST_DURATION=${MAX_TEST_DURATION:-300s}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - MAX_STORED_RESULTS=${MAX_STORED_RESULTS:-10000}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-}
      - TLS_AUTO_GEN=${TLS_AUTO_GEN:-false}
      - HTTP2_ENABLED=${HTTP2_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      - PPROF_ADDR=${PPROF_ADDR:-127.0.0.1:6060}
      - PERF_STATS_INTERVAL=${PERF_STATS_INTERVAL:-}
      - RUNTIME_METRICS_ENABLED=${RUNTIME_METRICS_ENABLED:-false}
    volumes:
      - openbyte-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  openbyte-data:
