# Multi-server deployment example
# Deploy multiple speed test servers on different host ports
# Usage: cd docker && docker compose -f docker-compose.yaml -f docker-compose.multi.yaml up

services:
  # US East server
  openbyte-us-east:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    image: openbyte:latest
    container_name: openbyte-us-east
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8082:8082/udp"
    environment:
      - PUBLIC_HOST=${US_EAST_HOST:-}
      - SERVER_NAME=${US_EAST_NAME:-US East}
      - CAPACITY_GBPS=25
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1000}
      - DATA_DIR=/app/data
    volumes:
      - openbyte-us-east-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - multi

  # EU West server
  openbyte-eu-west:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    image: openbyte:latest
    container_name: openbyte-eu-west
    ports:
      - "8180:8080"
      - "8181:8081"
      - "8182:8082"
      - "8182:8082/udp"
    environment:
      - PUBLIC_HOST=${EU_WEST_HOST:-}
      - SERVER_NAME=${EU_WEST_NAME:-EU West}
      - CAPACITY_GBPS=25
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1000}
      - DATA_DIR=/app/data
    volumes:
      - openbyte-eu-west-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - multi

  # Asia Pacific server
  openbyte-ap-south:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    image: openbyte:latest
    container_name: openbyte-ap-south
    ports:
      - "8280:8080"
      - "8281:8081"
      - "8282:8082"
      - "8282:8082/udp"
    environment:
      - PUBLIC_HOST=${AP_SOUTH_HOST:-}
      - SERVER_NAME=${AP_SOUTH_NAME:-AP South}
      - CAPACITY_GBPS=25
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-100}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1000}
      - DATA_DIR=/app/data
    volumes:
      - openbyte-ap-south-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - multi

volumes:
  openbyte-us-east-data:
  openbyte-eu-west-data:
  openbyte-ap-south-data:
