services:
  # Published single-server deployment
  openbyte:
    image: ghcr.io/${GHCR_OWNER:-saveenergy}/openbyte:${IMAGE_TAG:-edge}
    container_name: openbyte
    ports:
      - "8080:8080" # API + Web UI
    environment:
      - SERVER_NAME
      - BRAND_PRIMARY_COLOR_DARK
      - BRAND_PRIMARY_COLOR_LIGHT
      - BRAND_SECONDARY_COLOR_DARK
      - BRAND_SECONDARY_COLOR_LIGHT
      - BRAND_LOGO_PATH
      - TRUST_PROXY_HEADERS
      - TRUSTED_PROXY_CIDRS
      - MAX_CONCURRENT_TRANSFERS
      - MAX_CONCURRENT_PER_IP
      - RATE_LIMIT_PER_IP
      - GLOBAL_RATE_LIMIT
      - MAX_TEST_DURATION
      - MAX_STORED_RESULTS
    volumes:
      - openbyte-data:/app/data
      - ${BRAND_ASSETS_DIR:-../branding}:/app/branding:ro
    restart: unless-stopped

volumes:
  openbyte-data:
