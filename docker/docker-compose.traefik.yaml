services:
  traefik:
    image: traefik:v3.6.23@sha256:f5dba1e65167778cd5f8d1b463fc5d200f49d40c6458fc9f4b391a68ebfb9534
    container_name: traefik
    command:
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--providers.file.filename=/etc/traefik/dynamic/openbyte.yaml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - ./traefik-openbyte.yaml:/etc/traefik/dynamic/openbyte.yaml:ro
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping=true"]
      interval: 30s
      timeout: 5s
      retries: 3

  openbyte:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openbyte.rule=${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}"
      - "traefik.http.routers.openbyte.entrypoints=web"
      - "traefik.http.services.openbyte.loadbalancer.server.port=8080"
      - "traefik.http.routers.openbyte-secure.rule=${TRAEFIK_HOST_RULE:-Host(`speedtest.localhost`)}"
      - "traefik.http.routers.openbyte-secure.entrypoints=websecure"
      - "traefik.http.routers.openbyte-secure.tls=true"
      - "traefik.http.routers.openbyte-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openbyte-secure.tls.options=${TRAEFIK_TLS_OPTIONS:-openbyte-h1@file}"
      - "traefik.http.routers.openbyte-secure.service=openbyte"
    networks:
      - traefik

networks:
  traefik:
    name: traefik
    driver: ${TRAEFIK_NETWORK_DRIVER-bridge}
    external: ${TRAEFIK_NETWORK_EXTERNAL:-false}

volumes:
  traefik-certs:
