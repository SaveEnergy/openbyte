openapi: "3.1.0"
info:
  title: openByte Speed Test API
  version: "1.0"
  description: |
    HTTP API for the openByte browser speed test server.
    All API endpoints are under `/api/v1/` except `/health`.
    Errors emitted by matched API handlers return `{"error":"message"}`;
    unmatched routes or methods may use the Go standard library's plain-text errors.
    openByte does not implement authentication.
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/ping:
    get:
      summary: Latency ping and client IP detection
      operationId: ping
      tags: [SpeedTest]
      parameters:
        - name: meta
          in: query
          schema:
            type: string
            enum: ["1"]
          description: Include the configured server display name when set to `1`. Omit for latency measurements.
      responses:
        "200":
          description: Client IP address with optional bootstrap metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /api/v1/download:
    get:
      summary: Download speed test stream
      operationId: download
      tags: [SpeedTest]
      parameters:
        - name: duration
          in: query
          schema:
            type: integer
            minimum: 1
          description: Duration in seconds. The configured whole-second MAX_TEST_DURATION is the upper bound (300 seconds by default); when that bound is below 10, an omitted duration uses the bound.
        - name: chunk
          in: query
          schema:
            type: integer
            minimum: 65536
            maximum: 4194304
            default: 1048576
          description: Chunk size in bytes.
      responses:
        "200":
          description: Binary data stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServerBusy"

  /api/v1/upload:
    post:
      summary: Upload speed test sink
      description: Reads raw request-body bytes until EOF or the configured MAX_TEST_DURATION. Content-Type is not validated; application/octet-stream is recommended.
      operationId: upload
      tags: [SpeedTest]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "503":
          $ref: "#/components/responses/ServerBusy"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/results:
    post:
      summary: Save a test result
      operationId: saveResult
      tags: [Results]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveResultRequest"
        description: Max 4096 bytes. When Content-Type is set, it must use the application/json media type.
      responses:
        "201":
          description: Result saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestEntityTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/results/{id}:
    get:
      summary: Get a saved result
      operationId: getResult
      tags: [Results]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-zA-Z]{8}$"
      responses:
        "200":
          description: Saved result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RequestEntityTooLarge:
      description: Request body exceeds size limit
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Unsupported content type
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerBusy:
      description: Server at capacity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service temporarily unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PingResponse:
      type: object
      additionalProperties: false
      required: [client_ip]
      properties:
        client_ip:
          type: string
          description: Canonical client IP address. A colon identifies IPv6.
        server_name:
          type: string
          description: Display name configured for this server. Present only when `meta=1`.

    UploadResponse:
      type: object
      properties:
        bytes:
          type: integer
          format: int64
        duration_ms:
          type: integer
          format: int64
        throughput_mbps:
          type: number
          format: double

    SaveResultRequest:
      type: object
      additionalProperties: false
      description: |
        Single JSON object. Body max 4096 bytes.
        Unknown fields are rejected.
        Validation: numeric fields >= 0; download_mbps/upload_mbps <= 100000;
        latency_ms/jitter_ms/loaded_latency_ms <= 60000; server_name <= 200 UTF-8 bytes;
        ipv4/ipv6 <= 45 UTF-8 bytes; bufferbloat_grade <= 5 UTF-8 bytes.
      properties:
        download_mbps:
          type: number
          format: double
          minimum: 0
        upload_mbps:
          type: number
          format: double
          minimum: 0
        latency_ms:
          type: number
          format: double
          minimum: 0
        jitter_ms:
          type: number
          format: double
          minimum: 0
        loaded_latency_ms:
          type: number
          format: double
          minimum: 0
        bufferbloat_grade:
          type: string
          description: Maximum 5 UTF-8 bytes.
        ipv4:
          type: string
          description: Maximum 45 UTF-8 bytes.
        ipv6:
          type: string
          description: Maximum 45 UTF-8 bytes.
        server_name:
          type: string
          description: Maximum 200 UTF-8 bytes.
    SaveResultResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          description: Same-origin relative result page path, for example `/results/aB3dE7xQ`.

    SavedResult:
      type: object
      properties:
        id:
          type: string
        download_mbps:
          type: number
          format: double
        upload_mbps:
          type: number
          format: double
        latency_ms:
          type: number
          format: double
        jitter_ms:
          type: number
          format: double
        loaded_latency_ms:
          type: number
          format: double
        bufferbloat_grade:
          type: string
        ipv4:
          type: string
        ipv6:
          type: string
        server_name:
          type: string
        created_at:
          type: string
          format: date-time
