name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  confidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.x"
          cache: true

      # Full race (no -short): complements ci.yml main-branch go test -race -short -p 1.
      - name: Race tests
        run: go test -race ./...

      - name: E2E tests
        run: go test ./test/e2e -timeout 5m

      - name: Perf bench (optional)
        if: ${{ vars.PERF_SMOKE == 'true' }}
        run: make perf-bench

      - name: Goroutine leak profile smoke (optional)
        if: ${{ vars.LEAK_PROFILE_SMOKE == 'true' }}
        run: make perf-leakcheck
