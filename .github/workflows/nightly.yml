name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  confidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"
          cache: true

      # Full race (no -short): complements ci.yml main-branch go test -race -short -p 1.
      - name: Race tests
        run: go test -race ./...

      - name: E2E tests
        run: go test ./test/e2e -timeout 5m

      # Default nightly (20260320-perf-01). Opt-out: set repo var PERF_BENCH to "false".
      - name: Perf bench
        if: ${{ vars.PERF_BENCH != 'false' }}
        run: make perf-bench

      - name: Goroutine leak profile smoke (optional)
        if: ${{ vars.LEAK_PROFILE_SMOKE == 'true' }}
        run: make perf-leakcheck
