name: ci

on:
  pull_request:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build/push/deploy even if no watched paths changed"
        type: boolean
        default: false

# PRs: cancel superseded runs (save minutes). main/tags/dispatch: do not cancel — avoids
# aborting an in-flight deploy when another push lands (next run queues per group).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect build-impacting changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docker:
              - "docker/**"
              - "cmd/**"
              - "internal/**"
              - "pkg/**"
              - "api/**"
              - "go.mod"
              - "go.sum"
              - "web/**"
            web:
              - "web/**"
              - "package.json"
              - "playwright.config.js"
              - "scripts/run-playwright.mjs"
              - "test/e2e/**"

  checks:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Lint
        run: make ci-lint

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "latest"

      - name: Install JS devDependencies (Playwright + Redocly)
        run: bun install --no-save

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: OpenAPI lint
        run: bun run lint:openapi

      - name: OpenAPI route contract
        run: go test ./test/unit/api -run TestOpenAPIRouteContract

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test (PR fast path)
        if: github.event_name == 'pull_request'
        run: go test -short ./...

      - name: Test (main)
        if: github.event_name != 'pull_request'
        run: go test ./...

      # -short: skip heavy tests (e.g. test/e2e skipIfShort). -p 1: serial packages, cap memory on GHA under race.
      - name: Race tests (main/tags)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: go test ./... -race -short -p 1

      - name: Get Playwright version
        if: github.event_name != 'pull_request' || needs.changes.outputs.web == 'true'
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: github.event_name != 'pull_request' || needs.changes.outputs.web == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: (github.event_name != 'pull_request' || needs.changes.outputs.web == 'true') && steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      - name: Install Playwright system deps
        if: (github.event_name != 'pull_request' || needs.changes.outputs.web == 'true') && steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps

      - name: Playwright e2e
        if: github.event_name != 'pull_request' || needs.changes.outputs.web == 'true'
        run: env -u NO_COLOR bunx playwright test

  build-push:
    needs: checks
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute image metadata
        id: image-meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openbyte"
          BASE_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.0)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "version=${BASE_TAG}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE_NAME}:edge" >> "$GITHUB_OUTPUT"
          echo "${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (server image)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          target: server
          push: true
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
          tags: ${{ steps.image-meta.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_HOST_FINGERPRINT: ${{ vars['SSH_HOST_FINGERPRINT'] }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      REMOTE_DIR: ${{ vars.REMOTE_DIR }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.SSH_HOST != '' && vars['SSH_HOST_FINGERPRINT'] != '' && vars.SSH_USER != '' && vars.REMOTE_DIR != '' && vars.GHCR_USERNAME != '' && needs.build-push.result == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build && vars.SSH_HOST != '' && vars['SSH_HOST_FINGERPRINT'] != '' && vars.SSH_USER != '' && vars.REMOTE_DIR != '' && vars.GHCR_USERNAME != '' && needs.build-push.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate deploy configuration
        run: bash scripts/deploy/validate_env.sh

      - name: Sync compose files to server
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
        run: bash scripts/deploy/sync_compose.sh

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
          DEPLOY_TAG: ${{ github.sha }}
        run: bash scripts/deploy/deploy_remote.sh

      - name: Cleanup SSH key material
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts ~/.ssh/known_hosts.tmp
