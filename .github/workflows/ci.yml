name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

# PRs: cancel superseded runs (save minutes). main/dispatch: do not cancel — avoids
# aborting an in-flight deploy when another push lands (next run queues per group).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # Playwright only runs on PRs that touch web-facing paths; pushes always run it.
      - name: Detect web changes (PRs)
        id: web-changes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" \
            | grep -qE '^(web/|package\.json$|bun\.lock$|playwright\.config\.js$|test/e2e/)'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: Lint
        run: make ci-lint

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "latest"

      - name: Install JS devDependencies (Playwright + Redocly)
        run: bun install --no-save

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: OpenAPI lint
        run: bun run lint:openapi

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: go test ./...

      # Serial packages cap memory on GHA under race.
      - name: Race tests (main)
        if: github.ref == 'refs/heads/main'
        run: go test ./... -race -p 1

      - name: Get Playwright version
        if: github.event_name != 'pull_request' || steps.web-changes.outputs.web == 'true'
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: github.event_name != 'pull_request' || steps.web-changes.outputs.web == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: (github.event_name != 'pull_request' || steps.web-changes.outputs.web == 'true') && steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      - name: Install Playwright system deps
        if: (github.event_name != 'pull_request' || steps.web-changes.outputs.web == 'true') && steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps

      - name: Playwright e2e
        if: github.event_name != 'pull_request' || steps.web-changes.outputs.web == 'true'
        run: env -u NO_COLOR bun run test:ui

  build-push:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Compute image metadata
        id: image-meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openbyte"
          BASE_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.0)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "version=${BASE_TAG}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGE_NAME}:edge" >> "$GITHUB_OUTPUT"
          echo "${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (server image)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          target: server
          push: true
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
          tags: ${{ steps.image-meta.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_HOST_FINGERPRINT: ${{ vars['SSH_HOST_FINGERPRINT'] }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      REMOTE_DIR: ${{ vars.REMOTE_DIR }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
      SERVER_NAME: ${{ vars.SERVER_NAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    if: |
      github.ref == 'refs/heads/main' &&
      vars.SSH_HOST != '' &&
      vars['SSH_HOST_FINGERPRINT'] != '' &&
      vars.SSH_USER != '' &&
      vars.REMOTE_DIR != '' &&
      vars.GHCR_USERNAME != '' &&
      needs.build-push.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Deploy
        env:
          DEPLOY_TAG: ${{ github.sha }}
        run: bash scripts/deploy/deploy.sh
