name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate SemVer tag early
        run: |
          set -euo pipefail
          echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || { echo "invalid release tag format: ${GITHUB_REF_NAME}"; exit 1; }

      - name: Verify release tag ancestry
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          TAG_COMMIT="$(git rev-list -n1 "${GITHUB_REF_NAME}")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main || {
            echo "release tag must point to a commit reachable from origin/main"
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Test (release gate)
        run: go test ./...

      # Keep release race parity with ci.yml: full non-race tests already ran above,
      # and full race coverage belongs to nightly. On hosted runners the full
      # release race pass can be SIGTERM-killed before it reaches later packages.
      - name: Race tests (release gate)
        run: go test -race ./... -short -p 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "latest"

      - name: Install JS devDependencies (Redocly)
        run: bun install --no-save

      - name: OpenAPI lint
        run: bun run lint:openapi

      - name: OpenAPI route contract
        run: go test ./test/unit/api -run TestOpenAPIRouteContract

      - name: Build release assets
        run: |
          set -euo pipefail
          SEMVER="${GITHUB_REF_NAME#v}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="${SEMVER}+${SHORT_SHA}"
          mkdir -p dist

          build_release() {
            local os="$1"
            local arch="$2"
            local ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            local out="dist/openbyte_${SEMVER}_${os}_${arch}"
            mkdir -p "$out"

            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out/openbyte${ext}" ./cmd/openbyte

            if [ "$os" = "windows" ]; then
              (cd "$out" && zip -r "../openbyte_${SEMVER}_${os}_${arch}.zip" .)
            else
              (cd "$out" && tar -czf "../openbyte_${SEMVER}_${os}_${arch}.tar.gz" .)
            fi
            rm -rf "$out"
          }

          build_release linux amd64
          build_release linux arm64
          build_release darwin amd64
          build_release darwin arm64
          build_release windows amd64

          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum *.tar.gz *.zip > checksums.txt
            else
              shasum -a 256 *.tar.gz *.zip > checksums.txt
            fi
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*

      - name: Compute image metadata
        id: image-meta
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openbyte" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}+${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image-meta.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (server image)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          target: server
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  deploy:
    needs: release
    if: vars.SSH_HOST != '' && vars['SSH_HOST_FINGERPRINT'] != '' && vars.SSH_USER != '' && vars.REMOTE_DIR != '' && vars.GHCR_USERNAME != '' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_HOST_FINGERPRINT: ${{ vars['SSH_HOST_FINGERPRINT'] }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      REMOTE_DIR: ${{ vars.REMOTE_DIR }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
      SERVER_NAME: ${{ vars.SERVER_NAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate deploy configuration
        run: bash scripts/deploy/validate_env.sh

      - name: Sync compose files to server
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
        run: bash scripts/deploy/sync_compose.sh

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid release tag format: $tag"; exit 1; }
          export DEPLOY_TAG="${tag#v}"
          bash scripts/deploy/deploy_remote.sh

      - name: Cleanup SSH key material
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts ~/.ssh/known_hosts.tmp
