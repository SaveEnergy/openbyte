name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image_pushed: ${{ steps.push.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate SemVer tag early
        run: |
          set -euo pipefail
          echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || { echo "invalid release tag format: ${GITHUB_REF_NAME}"; exit 1; }

      - name: Verify release tag ancestry
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          TAG_COMMIT="$(git rev-list -n1 "${GITHUB_REF_NAME}")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main || {
            echo "release tag must point to a commit reachable from origin/main"
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Test (release gate)
        run: go test ./...

      - name: Race tests (release gate)
        run: go test -race ./... -p 1

      - name: OpenAPI lint
        run: npx @redocly/cli@2.18.1 lint api/openapi.yaml --config redocly.yaml

      - name: OpenAPI route contract
        run: go test ./test/unit/api -run TestOpenAPIRouteContract

      - name: Build release assets
        run: |
          set -euo pipefail
          SEMVER="${GITHUB_REF_NAME#v}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION="${SEMVER}+${SHORT_SHA}"
          mkdir -p dist

          build_release() {
            local os="$1"
            local arch="$2"
            local ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            local out="dist/openbyte_${SEMVER}_${os}_${arch}"
            mkdir -p "$out"

            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out/openbyte${ext}" ./cmd/openbyte

            if [ "$os" = "windows" ]; then
              (cd "$out" && zip -r "../openbyte_${SEMVER}_${os}_${arch}.zip" .)
            else
              (cd "$out" && tar -czf "../openbyte_${SEMVER}_${os}_${arch}.tar.gz" .)
            fi
            rm -rf "$out"
          }

          build_release linux amd64
          build_release linux arm64
          build_release darwin amd64
          build_release darwin arm64
          build_release windows amd64

          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum *.tar.gz *.zip > checksums.txt
            else
              shasum -a 256 *.tar.gz *.zip > checksums.txt
            fi
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*

      - name: Compute image metadata
        id: image-meta
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openbyte" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}+${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.image-meta.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (server image)
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          target: server
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.image-meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  deploy:
    needs: release
    if: vars.SSH_HOST != '' && vars['SSH_HOST_FINGERPRINT'] != '' && vars.SSH_USER != '' && vars.REMOTE_DIR != '' && vars.GHCR_USERNAME != '' && needs.release.outputs.image_pushed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_HOST_FINGERPRINT: ${{ vars['SSH_HOST_FINGERPRINT'] }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      REMOTE_DIR: ${{ vars.REMOTE_DIR }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Validate deploy configuration
        run: |
          [ -n "${SSH_HOST}" ] || { echo "SSH_HOST not set"; exit 1; }
          [ -n "${SSH_HOST_FINGERPRINT}" ] || { echo "SSH_HOST_FINGERPRINT not set"; exit 1; }
          [ -n "${SSH_USER}" ] || { echo "SSH_USER not set"; exit 1; }
          [ -n "${REMOTE_DIR}" ] || { echo "REMOTE_DIR not set"; exit 1; }
          [ -n "${GHCR_USERNAME}" ] || { echo "GHCR_USERNAME not set"; exit 1; }
          [ -n "${SSH_KEY}" ] || { echo "SSH_KEY not set"; exit 1; }
          [ -n "${GHCR_TOKEN}" ] || { echo "GHCR_TOKEN not set"; exit 1; }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync compose files to server
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
        run: |
          set -euo pipefail
          [ -n "${REMOTE_DIR:-}" ] || { echo "REMOTE_DIR not set"; exit 1; }
          SSH_TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$SSH_TMP_DIR"' EXIT
          printf '%s\n' "$SSH_KEY" > "$SSH_TMP_DIR/id_rsa"
          chmod 600 "$SSH_TMP_DIR/id_rsa"
          touch "$SSH_TMP_DIR/known_hosts"
          timeout 15 ssh-keyscan -t ed25519 -p "${SSH_PORT:-22}" -H "$SSH_HOST" > "$SSH_TMP_DIR/known_hosts.tmp"
          [ -s "$SSH_TMP_DIR/known_hosts.tmp" ] || { echo "ssh-keyscan returned no ed25519 host keys"; exit 1; }
          scanned_fingerprint="$(ssh-keygen -lf "$SSH_TMP_DIR/known_hosts.tmp" -E sha256 | awk 'NR==1 {print $2}')"
          [ "$scanned_fingerprint" = "$SSH_HOST_FINGERPRINT" ] || {
            echo "ssh host fingerprint mismatch"
            echo "expected=$SSH_HOST_FINGERPRINT"
            echo "got=${scanned_fingerprint:-missing}"
            exit 1
          }
          cat "$SSH_TMP_DIR/known_hosts.tmp" >> "$SSH_TMP_DIR/known_hosts"
          rm -f "$SSH_TMP_DIR/known_hosts.tmp"
          ssh -i "$SSH_TMP_DIR/id_rsa" -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p \"${REMOTE_DIR}/docker\""
          scp -i "$SSH_TMP_DIR/id_rsa" -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" -P "${SSH_PORT:-22}" \
            docker/docker-compose.ghcr.yaml \
            docker/docker-compose.ghcr.traefik.yaml \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}/docker/"
          ssh -i "$SSH_TMP_DIR/id_rsa" -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
            "test -f \"${REMOTE_DIR}/docker/docker-compose.ghcr.yaml\" && test -f \"${REMOTE_DIR}/docker/docker-compose.ghcr.traefik.yaml\""
          local_main_sha="$(sha256sum docker/docker-compose.ghcr.yaml | cut -d ' ' -f1)"
          local_traefik_sha="$(sha256sum docker/docker-compose.ghcr.traefik.yaml | cut -d ' ' -f1)"
          remote_main_sha="$(ssh -i "$SSH_TMP_DIR/id_rsa" -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "if command -v sha256sum >/dev/null 2>&1; then sha256sum \"${REMOTE_DIR}/docker/docker-compose.ghcr.yaml\" | cut -d ' ' -f1; else shasum -a 256 \"${REMOTE_DIR}/docker/docker-compose.ghcr.yaml\" | cut -d ' ' -f1; fi")"
          remote_traefik_sha="$(ssh -i "$SSH_TMP_DIR/id_rsa" -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "if command -v sha256sum >/dev/null 2>&1; then sha256sum \"${REMOTE_DIR}/docker/docker-compose.ghcr.traefik.yaml\" | cut -d ' ' -f1; else shasum -a 256 \"${REMOTE_DIR}/docker/docker-compose.ghcr.traefik.yaml\" | cut -d ' ' -f1; fi")"
          if [ "$local_main_sha" != "$remote_main_sha" ]; then
            echo "compose checksum mismatch for docker-compose.ghcr.yaml"
            exit 1
          fi
          if [ "$local_traefik_sha" != "$remote_traefik_sha" ]; then
            echo "compose checksum mismatch for docker-compose.ghcr.traefik.yaml"
            exit 1
          fi

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_HOST_FINGERPRINT: ${{ env.SSH_HOST_FINGERPRINT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          SSH_KEY: ${{ env.SSH_KEY }}
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${REMOTE_DIR:-}" ] || { echo "REMOTE_DIR not set"; exit 1; }
          DEPLOY_TAG="${GITHUB_REF_NAME}"
          [[ "$DEPLOY_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid release tag format: $DEPLOY_TAG"; exit 1; }
          DEPLOY_TAG="${DEPLOY_TAG#v}"

          SSH_TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$SSH_TMP_DIR"' EXIT
          printf '%s\n' "$SSH_KEY" > "$SSH_TMP_DIR/id_rsa"
          chmod 600 "$SSH_TMP_DIR/id_rsa"
          touch "$SSH_TMP_DIR/known_hosts"
          timeout 15 ssh-keyscan -t ed25519 -p "${SSH_PORT:-22}" -H "$SSH_HOST" > "$SSH_TMP_DIR/known_hosts.tmp"
          [ -s "$SSH_TMP_DIR/known_hosts.tmp" ] || { echo "ssh-keyscan returned no ed25519 host keys"; exit 1; }
          scanned_fingerprint="$(ssh-keygen -lf "$SSH_TMP_DIR/known_hosts.tmp" -E sha256 | awk 'NR==1 {print $2}')"
          [ "$scanned_fingerprint" = "$SSH_HOST_FINGERPRINT" ] || {
            echo "ssh host fingerprint mismatch"
            echo "expected=$SSH_HOST_FINGERPRINT"
            echo "got=${scanned_fingerprint:-missing}"
            exit 1
          }
          cat "$SSH_TMP_DIR/known_hosts.tmp" >> "$SSH_TMP_DIR/known_hosts"
          rm -f "$SSH_TMP_DIR/known_hosts.tmp"

          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REMOTE_DIR_Q="$(printf '%q' "$REMOTE_DIR")"
          GHCR_USERNAME_Q="$(printf '%q' "$GHCR_USERNAME")"
          GHCR_TOKEN_Q="$(printf '%q' "$GHCR_TOKEN")"
          OWNER_LC_Q="$(printf '%q' "$OWNER_LC")"
          DEPLOY_TAG_Q="$(printf '%q' "$DEPLOY_TAG")"

          ssh -i "$SSH_TMP_DIR/id_rsa" \
            -o UserKnownHostsFile="$SSH_TMP_DIR/known_hosts" \
            -o IdentitiesOnly=yes \
            -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" \
            "REMOTE_DIR=$REMOTE_DIR_Q GHCR_USERNAME=$GHCR_USERNAME_Q GHCR_TOKEN=$GHCR_TOKEN_Q OWNER_LC=$OWNER_LC_Q DEPLOY_TAG=$DEPLOY_TAG_Q sh -seu" <<'EOF'
          [ -n "$REMOTE_DIR" ] || { echo "REMOTE_DIR not set"; exit 1; }
          test -f "$REMOTE_DIR/.env" || { echo "Missing .env at $REMOTE_DIR/.env"; exit 1; }
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
          cd "$REMOTE_DIR"
          docker network inspect traefik >/dev/null 2>&1 || docker network create traefik >/dev/null 2>&1 || { echo "failed to create traefik network"; exit 1; }
          docker network inspect traefik >/dev/null 2>&1 || { echo "traefik network missing after create"; exit 1; }
          GHCR_OWNER="$OWNER_LC" IMAGE_TAG="$DEPLOY_TAG" docker compose --env-file "$REMOTE_DIR/.env" -f docker/docker-compose.ghcr.yaml -f docker/docker-compose.ghcr.traefik.yaml pull || { echo "docker compose pull failed"; exit 1; }
          EXPECTED_IMAGE="ghcr.io/${OWNER_LC}/openbyte:${DEPLOY_TAG}"
          expected_id=$(docker image inspect "$EXPECTED_IMAGE" -f '{{.Id}}' 2>/dev/null || true)
          [ -n "$expected_id" ] || { echo "expected image missing after pull: $EXPECTED_IMAGE"; docker logout ghcr.io || true; exit 1; }
          rollback_name="openbyte_rollback_prev"
          rollback_enabled=0
          if docker inspect openbyte >/dev/null 2>&1; then
            docker rm -f "$rollback_name" >/dev/null 2>&1 || true
            docker rename openbyte "$rollback_name"
            rollback_enabled=1
          fi
          GHCR_OWNER="$OWNER_LC" IMAGE_TAG="$DEPLOY_TAG" docker compose --env-file "$REMOTE_DIR/.env" -f docker/docker-compose.ghcr.yaml -f docker/docker-compose.ghcr.traefik.yaml up -d --force-recreate
          running_id=$(docker inspect -f '{{.Image}}' openbyte 2>/dev/null || true)
          if [ -z "$expected_id" ] || [ -z "$running_id" ] || [ "$expected_id" != "$running_id" ]; then
            echo "deployed image mismatch expected=$EXPECTED_IMAGE expected_id=$expected_id running_id=$running_id"
            if [ "$rollback_enabled" -eq 1 ]; then
              docker rm -f openbyte >/dev/null 2>&1 || true
              docker rename "$rollback_name" openbyte >/dev/null 2>&1 || { echo "rollback rename failed"; exit 1; }
              docker start openbyte >/dev/null 2>&1 || { echo "rollback start failed"; exit 1; }
            fi
            docker logout ghcr.io || true
            exit 1
          fi
          i=1
          while [ "$i" -le 20 ]; do
            state=$(docker inspect -f '{{.State.Status}}' openbyte 2>/dev/null || true)
            if [ "$state" != "running" ]; then
              echo "container not running: state=$state"
              i=$((i + 1))
              sleep 3
              continue
            fi
            status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' openbyte 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              if [ "$rollback_enabled" -eq 1 ]; then
                docker rm -f "$rollback_name" >/dev/null 2>&1 || true
              fi
              docker logout ghcr.io || true
              exit 0
            fi
            i=$((i + 1))
            sleep 3
          done
          docker inspect openbyte --format '{{json .State}}' || true
          if [ "$rollback_enabled" -eq 1 ]; then
            docker rm -f openbyte >/dev/null 2>&1 || true
            docker rename "$rollback_name" openbyte >/dev/null 2>&1 || { echo "rollback rename failed"; exit 1; }
            docker start openbyte >/dev/null 2>&1 || { echo "rollback start failed"; exit 1; }
          fi
          docker logout ghcr.io || true
          exit 1
          EOF

      - name: Cleanup SSH key material
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts ~/.ssh/known_hosts.tmp
